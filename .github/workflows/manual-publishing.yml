name: publishing
on:
  workflow_dispatch: 
jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ZeroMCP/ZeroMCP.csproj

      - name: Build
        run: dotnet build ZeroMCP/ZeroMCP.csproj -c Release --no-restore

      - name: Pack
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          dotnet pack ZeroMCP/ZeroMCP.csproj -c Release -o ./nupkgs --no-build -p:Version=$VERSION

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Add GitHub NuGet source
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "anything" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Push to GitHub Package Registry
        run: dotnet nuget push ./nupkgs/*.nupkg \
          --source github \
          --api-key "${{ secrets.GITHUB_TOKEN }}" \
          --skip-duplicate
