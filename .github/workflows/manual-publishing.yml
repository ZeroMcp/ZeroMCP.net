name: publishing
on:
  workflow_dispatch: 
jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

          
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ZeroMCP/ZeroMCP.csproj

      - name: Build
        run: dotnet build ZeroMCP/ZeroMCP.csproj -c Release --no-restore

      - name: Pack
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(git tag --list "v*" --sort=-version:refname | head -n1)
            VERSION=${VERSION#v}
          fi
           dotnet pack ZeroMcp.Relay/ZeroMcp.Relay.csproj -c Release -p:Version=${VERSION} -o ./artifacts

      - name: Push to NuGet.org
        if: env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push ./artifacts/*.nupkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
